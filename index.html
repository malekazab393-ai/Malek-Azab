<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>روابط الأدوات والفيديوهات - مالك علي 
    </title>
    <style>
        /* إعدادات الخلفية والخط */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f 0%, #4e54c8 100%);
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            color: white;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            padding-top: 20px;
        }

        /* تنسيق الصورة الشخصية */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            margin-bottom: 15px;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        
        .profile-img:hover {
            transform: scale(1.05);
        }

        h1 {
            font-size: 24px;
            margin: 10px 0;
            font-weight: bold;
        }

        .bio {
            font-size: 15px;
            opacity: 0.9;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* تنسيق قائمة الروابط */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* تنسيق الزرار */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center; /* توسيط النص */
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 14px 20px;
            text-decoration: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* تأثير الحركة عند التمرير بالماوس */
        .btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* تأثير عند الضغط */
        .btn:active {
            transform: scale(0.96);
        }

        /* تذييل الصفحة */
        footer {
            margin-top: 50px;
            padding-bottom: 20px;
            font-size: 13px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="malek.png" alt="عبد الله أحمد" class="profile-img">
        
        <h1>مالك علي</h1>
        <p class="bio">صانع محتوى تقني 🚀<br>أفضل الأدوات والتطبيقات في مكان واحد</p>

        <div class="links-container">
            
            <a href="https://uptoz.com/2152?hpub=ga_abdo_glitch" target="_blank" class="btn">
                تطبيق صنع فيديوهات بالـ AI 🤖
            </a>

            <a href="https://uptoz.com/222?hpub=ga_abdo_glitch" target="_blank" class="btn">
                تطبيق تأثير Depth Wallpaper 🖼️
            </a>

            <a href="https://uptoz.com/1937?hpub=ga_abdo_glitch" target="_blank" class="btn">
                تطبيق الترجمة بدون نت 🤩
            </a>

            <a href="https://uptoz.com/298?hpub=ga_abdo_glitch" target="_blank" class="btn">
                تطبيق تغيير الصوت 😨
            </a>

            <a href="https://uptoz.com/1871?hpub=ga_abdo_glitch" target="_blank" class="btn">
                تطبيق بديل كاب كات 👻
            </a>
                
            <a href="https://uptoz.com/1732?hpub=ga_abdo_glitch" target="_blank" class="btn">
                تطبيق التأكد من صحة الحديث 🕌
            </a>

            <a href="https://uptoz.com/518?hpub=ga_abdo_glitch" target="_blank" class="btn">
                أداة الصور الذكية !! ✨
            </a>

        </div>

        <footer>
            تم التصميم بواسطة مالك &copy; 2026
        </footer>
    </div>

</body>
</html>
